spring:
  main:
    # 1. Turn off the Spring Boot ASCII art startup logo
    banner-mode: "off"
    # 2. Prevent Spring from logging "Starting Application..." metadata
    log-startup-info: false
  shell:
    interactive:
      enabled: false

logging:
  level:
    # 3. Completely silence default framework logs (INFO/DEBUG)
    root: "OFF"
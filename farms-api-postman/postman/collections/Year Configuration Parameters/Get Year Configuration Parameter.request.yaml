$kind: http-request
name: Get Year Configuration Parameter
url: "{{baseUrl}}/yearConfigurationParameters/:yearConfigurationParameterId"
method: GET
pathVariables:
  yearConfigurationParameterId: "102"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const json = pm.response.json();\r

      \r

      pm.test(\"Response contains @type = YearConfigurationParameterRsrc\",
      function() {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"YearConfigurationParameterRsrc\
      \");\r

      });"
    language: text/javascript
order: 4383180087194499

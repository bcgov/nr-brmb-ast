$kind: http-request
name: Update Structure Group Attribute
url: "{{baseUrl}}/structureGroupAttributes/:structureGroupAttributeId"
method: PUT
pathVariables:
  structureGroupAttributeId: "{{structureGroupAttributeId}}"
body:
  type: json
  content: "{\r

    \    \"@type\": \"StructureGroupAttributeRsrc\",\r

    \    \"structureGroupAttributeId\": {{structureGroupAttributeId}},\r

    \    \"structureGroupCode\": \"1\",\r

    \    \"rollupStructureGroupCode\": \"100\",\r

    \    \"userEmail\": \"test.user@example.com\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"

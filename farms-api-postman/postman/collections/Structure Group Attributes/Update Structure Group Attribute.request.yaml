      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"StructureGroupAttributeRsrc\"\
      );\r

      });\r

      \r

      pm.test(\"Record is updated as is\", function() {\r

      \r

      \    pm.expect(json).to.have.property(\"structureGroupCode\");\r

      \    pm.expect(json.structureGroupCode).to.be.equal(\"1\");\r

      \    pm.expect(json).to.have.property(\"structureGroupDesc\");\r


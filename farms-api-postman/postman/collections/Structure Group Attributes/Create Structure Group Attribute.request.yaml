$kind: http-request
name: Create Structure Group Attribute
url: "{{baseUrl}}/structureGroupAttributes"
method: POST
body:
  type: json
  content: "{\r

    \    \"@type\": \"StructureGroupAttributeRsrc\",\r

    \    \"structureGroupCode\": \"1\",\r

    \    \"rollupStructureGroupCode\": null,\r

    \    \"userEmail\": \"test.user@example.com\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      const json = pm.response.json()\r

      \r

      pm.environment.set(\"structureGroupAttributeId\",
      json.structureGroupAttributeId);\r

      \r

      pm.test(\"Response contains @type = StructureGroupAttributeRsrc\",
      function() {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"StructureGroupAttributeRsrc\"\
      );\r

      });"
    language: text/javascript
order: 4463855098404040

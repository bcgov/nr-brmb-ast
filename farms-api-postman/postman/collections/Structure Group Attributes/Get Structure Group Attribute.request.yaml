$kind: http-request
name: Get Structure Group Attribute
url: "{{baseUrl}}/structureGroupAttributes/:structureGroupAttributeId"
method: GET
pathVariables:
  structureGroupAttributeId: "3680"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const json = pm.response.json();\r

      \r

      pm.test(\"Response contains @type = StructureGroupAttributeRsrc\",
      function() {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"StructureGroupAttributeRsrc\"\
      );\r

      });"
    language: text/javascript
order: 4436778548390669

$kind: http-request
name: Update Inventory Item Detail
url: "{{baseUrl}}/inventoryItemDetails/:inventoryItemDetailId"
method: PUT
pathVariables:
  inventoryItemDetailId: "{{inventoryItemDetailId}}"
body:
  type: json
  content: "{\r

    \    \"@type\": \"InventoryItemDetailRsrc\",\r

    \    \"inventoryItemDetailId\": {{inventoryItemDetailId}},\r

    \    \"programYear\": 2026,\r

    \    \"eligibilityInd\": \"Y\",\r


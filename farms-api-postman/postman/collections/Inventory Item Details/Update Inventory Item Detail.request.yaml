    \    \"commodityTypeCode\": \"FORAGE\",\r

    \    \"fruitVegTypeCode\": \"APPLE\",\r

    \    \"multiStageCommdtyCode\": null,\r

    \    \"userEmail\": null\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"

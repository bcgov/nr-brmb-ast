$kind: http-request
name: Create Fruit Veg Type Detail
url: "{{baseUrl}}/fruitVegTypeDetails"
method: POST
body:
  type: json
  content: "{\r

    \    \"@type\": \"FruitVegTypeDetailRsrc\",\r

    \    \"fruitVegTypeCode\": \"SALAK\",\r

    \    \"fruitVegTypeDesc\": \"Salak\",\r

    \    \"revenueVarianceLimit\": 20.000,\r

    \    \"userEmail\": \"test.user@example.com\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      const json = pm.response.json()\r

      \r

      pm.environment.set(\"fruitVegTypeCode\", json.fruitVegTypeCode);\r

      \r

      pm.test(\"Response contains @type = FruitVegTypeDetailRsrc\", function()
      {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"FruitVegTypeDetailRsrc\");\r

      });"
    language: text/javascript
order: 4471489967890467

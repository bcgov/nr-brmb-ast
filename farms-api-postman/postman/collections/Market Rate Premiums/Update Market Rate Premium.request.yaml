$kind: http-request
name: Update Market Rate Premium
url: "{{baseUrl}}/marketRatePremiums/:marketRatePremiumId"
method: PUT
pathVariables:
  marketRatePremiumId: "{{marketRatePremiumId}}"
body:
  type: json
  content: "{\r

    \    \"@type\": \"MarketRatePremiumRsrc\",\r

    \    \"marketRatePremiumId\": {{marketRatePremiumId}},\r

    \    \"minTotalPremiumAmount\": 5003.00,\r

    \    \"maxTotalPremiumAmount\": 10002.00,\r

    \    \"riskChargeFlatAmount\": 102.00,\r

    \    \"riskChargePctPremium\": 3.00,\r

    \    \"adjustChargeFlatAmount\": 67.00,\r

    \    \"userEmail\": \"test.user@example.com\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const json = pm.response.json()\r

      \r

      pm.test(\"Response contains @type = MarketRatePremiumRsrc\", function()
      {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"MarketRatePremiumRsrc\");\r

      });\r

      \r

      pm.test(\"Record is updated as is\", function() {\r

      \r

      \    pm.expect(json).to.have.property(\"minTotalPremiumAmount\");\r

      \    pm.expect(json.minTotalPremiumAmount).to.be.equal(5003.00);\r

      \r

      \    pm.expect(json).to.have.property(\"maxTotalPremiumAmount\");\r

      \    pm.expect(json.maxTotalPremiumAmount).to.be.equal(10002.00);\r

      \r

      \    pm.expect(json).to.have.property(\"riskChargeFlatAmount\");\r

      \    pm.expect(json.riskChargeFlatAmount).to.be.equal(102.00);\r

      \r

      \    pm.expect(json).to.have.property(\"riskChargePctPremium\");\r

      \    pm.expect(json.riskChargePctPremium).to.be.equal(3.00);\r

      \r

      \    pm.expect(json).to.have.property(\"adjustChargeFlatAmount\");\r

      \    pm.expect(json.adjustChargeFlatAmount).to.be.equal(67.00);\r

      });"
    language: text/javascript

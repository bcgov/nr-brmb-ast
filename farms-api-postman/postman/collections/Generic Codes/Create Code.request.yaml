$kind: http-request
name: Create Code
url: "{{baseUrl}}/codeTables/:codeTableName/codes"
method: POST
pathVariables:
  - key: codeTableName
    value: farm_municipality_codes
    $type: ""
body:
  type: json
  content: "{\r

    \    \"@type\": \"http://common.brmb.nrs.gov.bc.ca/v1/code\",\r

    \    \"code\": \"1000\",\r

    \    \"description\": \"Test Municipality\",\r

    \    \"displayOrder\": null,\r

    \    \"effectiveDate\": \"2026-04-14\",\r

    \    \"expiryDate\": \"9999-12-31\",\r

    \    \"userEmail\": \"test.user@example.com\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      const json = pm.response.json()\r

      \r

      pm.environment.set(\"code\", json.code);\r

      \r

      pm.test(\"Response contains @type =
      http://common.brmb.nrs.gov.bc.ca/v1/code\", function() {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"http://common.brmb.nrs.gov.bc\
      .ca/v1/code\");\r

      });"
    language: text/javascript
order: 4391769441119153

$kind: http-request
name: Get Benchmark Per Units By Program Year
url: "{{baseUrl}}/benchmarkPerUnits?programYear=2025"
method: GET
queryParams:
  programYear: "2025"
auth:
  credentials:
    token: "{{access_token}}"
  type: bearer
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const json = pm.response.json();\r

      \r

      pm.test(\"Response contains @type = BenchmarkPerUnitListRsrc\", function()
      {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"BenchmarkPerUnitListRsrc\");\r

      });\r

      \r

      pm.test(\"benchmarkPerUnitList is not empty\", function() {\r

      \    pm.expect(json).to.have.property(\"benchmarkPerUnitList\");\r

      \    pm.expect(json.benchmarkPerUnitList.length).to.be.greaterThan(0);\r

      });\r

      \r

      pm.test(\"benchmarkPerUnitList[0] contains @type = BenchmarkPerUnitRsrc\",
      function() {\r

      \    pm.expect(json.benchmarkPerUnitList[0]).to.have.property(\"@type\");\
      \r

      \    pm.expect(json.benchmarkPerUnitList[0]['@type']).to.be.equal(\"Bench\
      markPerUnitRsrc\");\r

      });"
    language: text/javascript
order: 4000

$kind: http-request
name: Create Inventory Item Attribute
url: "{{baseUrl}}/inventoryItemAttributes"
method: POST
body:
  type: json
  content: "{\r

    \    \"@type\": \"InventoryItemAttributeRsrc\",\r

    \    \"inventoryItemCode\": \"5003\",\r

    \    \"rollupInventoryItemCode\": \"7207\",\r

    \    \"userEmail\": \"test.user@example.com\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"

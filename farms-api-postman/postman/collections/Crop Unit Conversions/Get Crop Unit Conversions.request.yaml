$kind: http-request
name: Get Crop Unit Conversions
url: "{{baseUrl}}/cropUnitConversions"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const json = pm.response.json();\r

      \r

      pm.test(\"Response contains @type = CropUnitConversionListRsrc\",
      function() {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"CropUnitConversionListRsrc\");\
      \r

      });\r

      \r

      pm.test(\"cropUnitConversionList is not empty\", function() {\r

      \    pm.expect(json).to.have.property(\"cropUnitConversionList\");\r

      \    pm.expect(json.cropUnitConversionList.length).to.be.greaterThan(0);\r

      });\r

      \r

      pm.test(\"cropUnitConversionList[0] contains @type =
      CropUnitConversionRsrc\", function() {\r

      \    pm.expect(json.cropUnitConversionList[0]).to.have.property(\"@type\"\
      );\r

      \    pm.expect(json.cropUnitConversionList[0]['@type']).to.be.equal(\"Cro\
      pUnitConversionRsrc\");\r

      });"

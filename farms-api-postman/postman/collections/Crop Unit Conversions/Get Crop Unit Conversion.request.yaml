$kind: http-request
name: Get Crop Unit Conversion
url: "{{baseUrl}}/cropUnitConversions/:cropUnitDefaultId"
method: GET
pathVariables:
  cropUnitDefaultId: "902"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const json = pm.response.json();\r

      \r

      pm.test(\"Response contains @type = CropUnitConversionModel\", function()
      {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"CropUnitConversionModel\");\r

      });"
    language: text/javascript
order: 3682847575140558

$kind: http-request
name: Create Expected Production
url: "{{baseUrl}}/expectedProductions"
method: POST
body:
  type: json
  content: "{\r

    \    \"@type\": \"ExpectedProductionRsrc\",\r

    \    \"expectedProductionPerProdUnit\": 21239.000,\r

    \    \"inventoryItemCode\": \"10\",\r

    \    \"cropUnitCode\": \"1\",\r

    \    \"userEmail\": \"test.user@example.com\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      const json = pm.response.json()\r

      \r

      pm.environment.set(\"expectedProductionId\", json.expectedProductionId);\r

      \r

      pm.test(\"Response contains @type = ExpectedProductionRsrc\", function()
      {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"ExpectedProductionRsrc\");\r

      });"
    language: text/javascript
order: 4496335975284856

$kind: http-request
name: Update Expected Production
url: "{{baseUrl}}/expectedProductions/:expectedProductionId"
method: PUT
pathVariables:
  expectedProductionId: "{{expectedProductionId}}"
body:
  type: json
  content: "{\r

    \    \"@type\": \"ExpectedProductionRsrc\",\r

    \    \"expectedProductionId\": {{expectedProductionId}},\r

    \    \"expectedProductionPerProdUnit\": 30000.000,\r

    \    \"inventoryItemCode\": \"10\",\r

    \    \"cropUnitCode\": \"1\",\r

    \    \"userEmail\": \"test.user@example.com\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const json = pm.response.json()\r

      \r

      pm.test(\"Response contains @type = ExpectedProductionRsrc\", function()
      {\r

      \    pm.expect(json).to.have.property(\"@type\");\r

      \    pm.expect(json['@type']).to.be.equal(\"ExpectedProductionRsrc\");\r

      });\r

      \r

      pm.test(\"Record is updated as is\", function() {\r

      \r

      \    pm.expect(json).to.have.property(\"expectedProductionPerProdUnit\");\
      \r

      \    pm.expect(json.expectedProductionPerProdUnit).to.be.equal(30000.000);\
      \r

      \r

      \    pm.expect(json).to.have.property(\"inventoryItemCode\");\r

      \    pm.expect(json.inventoryItemCode).to.be.equal(\"10\");\r

      \r

      \    pm.expect(json).to.have.property(\"cropUnitCode\");\r

      \    pm.expect(json.cropUnitCode).to.be.equal(\"1\");\r

      });"
    language: text/javascript
order: 4497197210146068

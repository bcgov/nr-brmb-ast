name: chef compare envs
run-name: Compare ${{ inputs.SOURCE_ENVIRONMENT}} to ${{ inputs.TARGET_ENVIRONMENT}} for ${{ inputs.FORM_NAME }}

on:
  workflow_dispatch:
    inputs:
      FORM_NAME:
        required: true
        type: choice
        options:
          - ADJUSTMENT_REQUEST_BCEID
          - ADJUSTMENT_REQUEST_IDIR
          - ADVANCED_PAYMENT_INTERIM_BCEID
          - ADVANCED_PAYMENT_INTERIM_IDIR
          - AGRISTABILITY_SUPPLEMENTAL_INFORMATION_BCEID
          - AGRISTABILITY_SUPPLEMENTAL_INFORMATION_IDIR
          - COVERAGE_NOTICE_BASIC_BCEID
          - COVERAGE_NOTICE_IDIR
          - NEW_PARTICIPANT_FORM_BCEID
          - NEW_PARTICIPANT_FORM_IDIR
          - NOTICE_OF_LOSS_FORM_BCEID
          - NOTICE_OF_LOSS_FORM_IDIR
          - SIMPLIFIED_REFERENCE_MARGIN_REQUEST_BCEID
          - SIMPLIFIED_REFERENCE_MARGIN_REQUEST_IDIR
          - STATEMENT_A_BCEID
          - STATEMENT_A_IDIR
      SOURCE_ENVIRONMENT:
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      TARGET_ENVIRONMENT:
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  export-source:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.SOURCE_ENVIRONMENT }}
    steps:
      - name: Fetch source form
        run: |

          mkdir output

          FORM_VERSION_ID=$(curl \
            -u "${{ secrets[format('{0}_FORM_ID', inputs.FORM_NAME)] }}:${{ secrets[format('{0}_FORM_SECRET', inputs.FORM_NAME)] }}" \
            -H "Content-Type: application/json" \
            ${{ vars.CHEFS_API_URL }}/v1/forms/${{ secrets[format('{0}_FORM_ID', inputs.FORM_NAME)] }}/ | jq -r '.versions[0].id')

          curl \
            -u "${{ secrets[format('{0}_FORM_ID', inputs.FORM_NAME)] }}:${{ secrets[format('{0}_FORM_SECRET', inputs.FORM_NAME)] }}" \
            -H "Content-Type: application/json" \
            ${{ vars.CHEFS_API_URL }}/v1/forms/${{ secrets[format('{0}_FORM_ID', inputs.FORM_NAME)] }}/versions/$FORM_VERSION_ID \
            -o output/source-form.json

          jq 'walk(if type == "object" then del(.id) else . end)' output/source-form.json > output/source-form-pretty.json

      - name: Upload source form
        uses: actions/upload-artifact@v4
        with:
          name: source-form-pretty
          path: output/source-form-pretty.json

  export-target:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.TARGET_ENVIRONMENT }}
    steps:
      - name: Fetch target form
        run: |

          mkdir output

          FORM_VERSION_ID=$(curl \
            -u "${{ secrets[format('{0}_FORM_ID', inputs.FORM_NAME)] }}:${{ secrets[format('{0}_FORM_SECRET', inputs.FORM_NAME)] }}" \
            -H "Content-Type: application/json" \
            ${{ vars.CHEFS_API_URL }}/v1/forms/${{ secrets[format('{0}_FORM_ID', inputs.FORM_NAME)] }}/ | jq -r '.versions[0].id')

          curl \
            -u "${{ secrets[format('{0}_FORM_ID', inputs.FORM_NAME)] }}:${{ secrets[format('{0}_FORM_SECRET', inputs.FORM_NAME)] }}" \
            -H "Content-Type: application/json" \
            ${{ vars.CHEFS_API_URL }}/v1/forms/${{ secrets[format('{0}_FORM_ID', inputs.FORM_NAME)] }}/versions/$FORM_VERSION_ID \
            -o output/target-form.json

          jq 'walk(if type == "object" then del(.id) else . end)' output/target-form.json > output/target-form-pretty.json

      - name: Upload target form
        uses: actions/upload-artifact@v4
        with:
          name: target-form-pretty
          path: output/target-form-pretty.json

  compare:
    runs-on: ubuntu-latest
    needs:
      - export-source
      - export-target
    steps:
      - name: Download source form
        uses: actions/download-artifact@v4
        with:
          name: source-form-pretty
          path: input

      - name: Download target form
        uses: actions/download-artifact@v4
        with:
          name: target-form-pretty
          path: input

      - name: Compare source to target
        run: |
          diff input/source-form-pretty.json input/target-form-pretty.json > diff-report.txt || true

      - name: Upload diff report
        uses: actions/upload-artifact@v4
        with:
          name: diff-report
          path: diff-report.txt
